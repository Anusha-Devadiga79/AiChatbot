<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HealthBot AI - Disease Awareness Chatbot</title>
  <link rel="stylesheet" href="../components/styles.css"/>
  <link rel="stylesheet" href="../components/auth.css"/>
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-brand">
      <div class="brand-icon">🏥</div>
      <h1>HealthBot AI</h1>
      <p>AI-Driven Public Health Chatbot for Disease Awareness</p>
    </div>

    <!-- Tab Switcher -->
    <div class="auth-tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="your@email.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-with-icon">
          <input type="password" id="loginPassword" placeholder="Enter password" required/>
          <span class="toggle-pw" onclick="togglePassword('loginPassword')">👁</span>
        </div>
      </div>
      <div id="loginError" class="error-msg hidden"></div>
      <button type="submit" class="btn-primary" id="loginBtn">
        <span class="btn-text">Login</span>
        <span class="btn-loader hidden">⏳</span>
      </button>
    </form>

    <!-- Register Form -->
    <form id="registerForm" class="auth-form hidden" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="regUsername" placeholder="Your name" required minlength="3"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="your@email.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-with-icon">
          <input type="password" id="regPassword" placeholder="Min 8 chars, 1 uppercase, 1 number" required/>
          <span class="toggle-pw" onclick="togglePassword('regPassword')">👁</span>
        </div>
        <div class="pw-strength" id="pwStrength"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Age</label>
          <input type="number" id="regAge" placeholder="Age" min="1" max="120"/>
        </div>
        <div class="form-group">
          <label>Gender</label>
          <select id="regGender">
            <option value="">Select</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
        </div>
      </div>
      <div id="registerError" class="error-msg hidden"></div>
      <button type="submit" class="btn-primary" id="registerBtn">
        <span class="btn-text">Create Account</span>
        <span class="btn-loader hidden">⏳</span>
      </button>
    </form>

    <p class="auth-footer">By using HealthBot AI, you agree that this is for awareness only. Always consult a doctor.</p>
  </div>

  <script src="../components/api.js"></script>
  <script src="../components/auth.js"></script>
</body>
</html>
